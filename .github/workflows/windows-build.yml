name: Build Windows

on:
  push:
    paths:
      - "windows/**"
      - ".github/workflows/windows-build.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: windows/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows/src-tauri

      - name: Install npm dependencies
        run: npm install

      - name: Generate Tauri icons
        # The bundler expects icons/icon.ico + icons/*.png. Use the existing PNG
        # in the repo root as the source. `cargo tauri icon` produces all the
        # platform-specific variants from a single 1024x1024 PNG.
        run: npx tauri icon ../icon.png
        continue-on-error: true

      - name: Build (Tauri bundle)
        run: npx tauri build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WeChatLongPic-Windows
          path: |
            windows/src-tauri/target/release/bundle/msi/*.msi
            windows/src-tauri/target/release/bundle/nsis/*.exe
            windows/src-tauri/target/release/*.exe
          if-no-files-found: warn
